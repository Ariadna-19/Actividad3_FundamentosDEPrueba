<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Restablecer contraseña</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
<main class="page-shell">
    <section class="panel">
        <span class="kicker">Recuperacion</span>
        <h1>Recupera tu acceso de forma segura</h1>
        <p>Solicita un token de un solo uso para restablecer tu contrasena. El proceso evita filtracion de informacion de cuentas.</p>
    </section>

    <section class="card">
        <h2>Recuperar contrasena</h2>
        <p class="subtitle">Te enviaremos un token temporal al correo registrado.</p>
        <form action="/forgot-password" method="post">
            <label for="email">Correo</label>
            <input id="email" type="email" name="email" placeholder="nombre@dominio.com" required />
            <button class="btn btn-primary" type="submit">Solicitar token</button>
        </form>
        <div class="link-row">
            <a class="btn btn-secondary" href="/">Ir al inicio</a>
            <a class="btn btn-secondary" href="/register">Crear cuenta</a>
        </div>
    </section>
</main>
</body>
</html>
